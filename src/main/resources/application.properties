# -----------------------------
# Core Application Settings
# -----------------------------
spring.application.name=bank

# -----------------------------
# PostgreSQL Database Connection
# -----------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/bank
spring.datasource.username=joel

# Note: Only leave this blank if your local Postgres user 'joel' actually has no password!
spring.datasource.password=ch930892

# -----------------------------
# JPA & Hibernate Settings
# -----------------------------
# Automatically creates or updates your database tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update

# Tells Hibernate to use PostgreSQL-specific SQL commands
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prints the SQL queries in your console so you can see what Spring is doing
spring.jpa.show-sql=true

# Forces Hibernate to use the exact names from your Java classes for database columns 
# (Instead of automatically converting camelCase to snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl